name: Build — Backend Services

# ── Responsibility ────────────────────────────────────────────────────────────
# This pipeline's ONLY job is:
#   1. Detect which services changed (on push)
#   2. Build Docker images and push to ECR
#   3. Auto-deploy to dev
#
# sit deployments are manual — take the image_tag from the build job output
# and trigger deploy.yml directly:
#   Actions → Deploy — ECS Service → Run workflow → service, env=sit, image_tag
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "backend-services/**"

  workflow_dispatch:
    inputs:
      service:
        description: "Service to build and deploy"
        required: true
        type: choice
        options:
          - bff
          - order-service
          - invoice-service

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:

  # ── 1. Detect ─────────────────────────────────────────────────────────────
  # Determines which services changed (push) or which was selected (dispatch).
  # Outputs a boolean per service so downstream jobs can conditionally run.

  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      bff:             ${{ steps.detect.outputs.bff }}
      order-service:   ${{ steps.detect.outputs.order-service }}
      invoice-service: ${{ steps.detect.outputs.invoice-service }}
      image_tag:       ${{ steps.detect.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed to diff against previous commit

      - name: Detect changes and compute image tag
        id: detect
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — only the selected service is flagged
            SVC="${{ github.event.inputs.service }}"
            echo "bff=$([ "$SVC" = "bff" ]             && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "order-service=$([ "$SVC" = "order-service" ]   && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "invoice-service=$([ "$SVC" = "invoice-service" ] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "Selected service: $SVC | tag: $IMAGE_TAG"
          else
            # Push — detect files changed vs previous commit
            git diff --name-only HEAD~1 HEAD > /tmp/changed.txt
            echo "Changed files:"
            cat /tmp/changed.txt

            grep -q "^backend-services/bff/"             /tmp/changed.txt && BFF=true     || BFF=false
            grep -q "^backend-services/order-service/"   /tmp/changed.txt && ORDER=true   || ORDER=false
            grep -q "^backend-services/invoice-service/" /tmp/changed.txt && INVOICE=true || INVOICE=false

            echo "bff=$BFF"                 >> $GITHUB_OUTPUT
            echo "order-service=$ORDER"     >> $GITHUB_OUTPUT
            echo "invoice-service=$INVOICE" >> $GITHUB_OUTPUT
            echo "Detected — bff:$BFF  order-service:$ORDER  invoice-service:$INVOICE | tag: $IMAGE_TAG"
          fi


  # ── 2. Build ──────────────────────────────────────────────────────────────
  # Builds Docker images for changed services only and pushes to ECR.
  # Uses a fixed 3-service matrix; each service skips its build steps if
  # it was not flagged as changed by the detect job.

  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect
    strategy:
      matrix:
        include:
          - service: bff
            changed: ${{ needs.detect.outputs.bff }}
          - service: order-service
            changed: ${{ needs.detect.outputs['order-service'] }}
          - service: invoice-service
            changed: ${{ needs.detect.outputs['invoice-service'] }}

    steps:
      - name: Skip if not changed
        id: gate
        run: |
          if [ "${{ matrix.changed }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "${{ matrix.service }} did not change — skipping build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        if: steps.gate.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.gate.outputs.skip != 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        if: steps.gate.outputs.skip != 'true'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:    ${{ needs.detect.outputs.image_tag }}
        run: |
          IMAGE=$ECR_REGISTRY/orderflow/${{ matrix.service }}:$IMAGE_TAG
          docker build -t $IMAGE backend-services/${{ matrix.service }}/
          docker push $IMAGE
          echo "Pushed: $IMAGE"


  # ── 3. Deploy to dev (auto) ───────────────────────────────────────────────
  # Calls deploy.yml once per changed service.
  # deploy-dev has no required reviewers → applies automatically.
  # All three can deploy in parallel.

  deploy-bff-dev:
    name: Deploy bff → dev
    needs: [detect, build]
    if: needs.detect.outputs.bff == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      service:   bff
      env:       dev
      image_tag: ${{ needs.detect.outputs.image_tag }}
    secrets: inherit

  deploy-order-dev:
    name: Deploy order-service → dev
    needs: [detect, build]
    if: needs.detect.outputs['order-service'] == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      service:   order-service
      env:       dev
      image_tag: ${{ needs.detect.outputs.image_tag }}
    secrets: inherit

  deploy-invoice-dev:
    name: Deploy invoice-service → dev
    needs: [detect, build]
    if: needs.detect.outputs['invoice-service'] == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      service:   invoice-service
      env:       dev
      image_tag: ${{ needs.detect.outputs.image_tag }}
    secrets: inherit

