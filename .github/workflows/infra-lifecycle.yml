name: Infrastructure Lifecycle — Teardown / Startup

# ── Purpose ──────────────────────────────────────────────────────────────────
# Cost-management workflow for the Fargate platform.
# Tears down the two billable resources between demos and restores them on
# demand. Fargate itself is pay-per-second, so when ECS tasks are stopped
# there is no compute cost — only the ALB and RDS incur idle charges.
#
# Resources DESTROYED on teardown (saves ~$29/month when idle):
#   - ALB                          (~$16/month)
#   - RDS db.t3.micro              (~$13/month after the 12-month free tier)
#   - ECS services scaled to 0     (Fargate per-second billing → $0)
#
# Resources PRESERVED (free / negligible cost):
#   - VPC, subnets, security groups, route tables, IGW
#   - ECS cluster, Cloud Map namespace, Fargate capacity provider association
#   - ECR image repositories (~$0.10/GB/month for storage)
#   - S3 buckets, CloudFront distribution (UI stays accessible; API will 502)
#   - IAM roles and policies, SSM parameters
#
# Data safety:
#   TEARDOWN → takes a manual RDS snapshot before destroying RDS.
#              Saves snapshot ID + last ECS image tags to SSM for restore.
#   STARTUP  → restores RDS from the snapshot via Terraform.
#              Re-deploys all ECS services using saved image tags.
#
# Zero error tolerance:
#   Every shell step uses `set -euo pipefail`.
#   Teardown is sequenced so dependents are removed before dependencies.
#   Startup is sequenced so infrastructure exists before services deploy.
#
# Approval gates:
#   Both flows are split into PLAN → APPROVE → APPLY jobs.
#   The plan job is read-only and runs immediately — it prints exactly what the
#   apply job will do. The apply job is bound to the `infra-approver-list`
#   GitHub environment, so it pauses for a human reviewer to click "Approve"
#   before any destructive action runs. If you reject the deployment, nothing
#   destructive happens — the plan is purely informational.
#
# Prerequisites:
#   GitHub repo variable : AWS_ROLE_ARN
#   GitHub repo secret   : DB_PASSWORD
#   GitHub environment   : infra-approver-list  (required reviewers configured)
#
# Usage:
#   Actions → Infrastructure Lifecycle → Run workflow
#   action = teardown  →  snapshots DB, destroys ALB + RDS, stops Fargate
#   action = startup   →  recreates ALB + RDS, restores DB, redeploys services
#   confirm            →  type the environment name exactly (e.g. dev) as a safety check
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      action:
        description: "teardown = snapshot DB and stop | startup = restore and start"
        required: true
        type: choice
        options:
          - teardown
          - startup
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
        default: dev
      confirm:
        description: "Safety check — type the environment name exactly (e.g. dev)"
        required: true

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.5

permissions:
  id-token: write
  contents: read

jobs:

  # ── Safety gate ─────────────────────────────────────────────────────────────
  preflight:
    name: Safety check
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "${{ inputs.environment }}" ]; then
            echo "FAIL: You typed '${{ inputs.confirm }}' but the environment is '${{ inputs.environment }}'."
            echo "      Type the environment name exactly in the 'confirm' field to proceed."
            exit 1
          fi
          echo "PASS: Confirmation matches environment '${{ inputs.environment }}'."


  # ── TEARDOWN PLAN (read-only) ────────────────────────────────────────────────
  # No `environment:` here — this job runs immediately to show the reviewer
  # exactly what the apply job will do. Nothing is modified.
  teardown-plan:
    name: "Teardown plan — ${{ inputs.environment }}"
    if: inputs.action == 'teardown'
    needs: preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve resource identifiers
        id: ids
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          PROJECT="orderflow"
          echo "cluster=${PROJECT}-${ENV}"          >> $GITHUB_OUTPUT
          echo "db_instance=${PROJECT}-mysql-${ENV}" >> $GITHUB_OUTPUT

      # ── Read-only inventory of what will be touched ─────────────────────────
      - name: "Inventory — ECS services + image tags"
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.ids.outputs.cluster }}"
          echo "=============================================="
          echo " ECS SERVICES (will be scaled to 0 then deleted)"
          echo "=============================================="
          for SERVICE in bff order-service invoice-service; do
            INFO=$(aws ecs describe-services \
              --cluster  "$CLUSTER" \
              --services "$SERVICE" \
              --query    'services[0].[status,desiredCount,runningCount,taskDefinition]' \
              --output   text 2>/dev/null || echo "MISSING")
            echo "  $SERVICE -> $INFO"
          done

      - name: "Inventory — RDS instance (will be snapshotted then destroyed)"
        run: |
          set -euo pipefail
          DB="${{ steps.ids.outputs.db_instance }}"
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB" \
            --query                  'DBInstances[0].[DBInstanceStatus,DBInstanceClass,AllocatedStorage]' \
            --output                 text 2>/dev/null || echo "not-found")
          echo "  $DB -> $STATUS"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      # Produce a destroy plan for the same -targets the apply job will use,
      # so the reviewer sees every Terraform-managed resource that will go.
      - name: "Generate destroy plan"
        working-directory: infra
        run: |
          set -euo pipefail
          terraform plan -destroy -input=false -no-color \
            -target=aws_db_instance.main \
            -target='aws_lb_listener_rule.services["bff"]' \
            -target=aws_lb_listener.http \
            -target='aws_lb_target_group.services["bff"]' \
            -target='aws_ssm_parameter.tg_arn["bff"]' \
            -target=aws_lb.main \
            -out=destroy.tfplan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: "Destroy plan — human-readable summary"
        working-directory: infra
        run: |
          set -euo pipefail
          echo "=============================================="
          echo " TERRAFORM RESOURCES TO BE DESTROYED"
          echo "=============================================="
          terraform show -no-color destroy.tfplan \
            | grep -E "^\s*#|^Plan:" \
            || true
          echo ""
          echo "=============================================="
          echo " WHAT HAPPENS NEXT"
          echo "=============================================="
          echo " 1. The 'Teardown apply' job is waiting for human approval."
          echo " 2. Open this run in the GitHub UI → 'Review deployments'"
          echo "    → Approve to proceed, or Reject to abort safely."
          echo " 3. On approve: image tags are saved, services drained &"
          echo "    deleted, RDS snapshotted, then the resources above are"
          echo "    destroyed."
          echo " 4. On reject: nothing is modified — the plan is discarded."
          echo "=============================================="


  # ── TEARDOWN APPLY (destructive, gated by environment approval) ──────────────
  # The `environment: infra-approver-list` line is the approval gate.
  # GitHub will pause this job and require a listed reviewer to approve
  # before any step here runs.
  teardown-apply:
    name: "Teardown apply — ${{ inputs.environment }}"
    if: inputs.action == 'teardown'
    needs: [preflight, teardown-plan]
    runs-on: ubuntu-latest
    environment: infra-approver-list
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve resource identifiers
        id: ids
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          PROJECT="orderflow"
          echo "cluster=${PROJECT}-${ENV}"                              >> $GITHUB_OUTPUT
          echo "db_instance=${PROJECT}-mysql-${ENV}"                   >> $GITHUB_OUTPUT
          echo "snapshot_id=${PROJECT}-${ENV}-$(date +%Y%m%d%H%M%S)"  >> $GITHUB_OUTPUT
          echo "env=${ENV}"                                            >> $GITHUB_OUTPUT

      # ── Step 1: Persist image tags before anything is deleted ────────────────
      - name: Save current ECS image tags to SSM
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.ids.outputs.cluster }}"
          ENV="${{ steps.ids.outputs.env }}"

          for SERVICE in bff order-service invoice-service; do
            TASK_DEF_ARN=$(aws ecs describe-services \
              --cluster  "$CLUSTER" \
              --services "$SERVICE" \
              --query    'services[0].taskDefinition' \
              --output   text 2>/dev/null || echo "")

            if [ -z "$TASK_DEF_ARN" ] || [ "$TASK_DEF_ARN" = "None" ]; then
              echo "WARN: Service $SERVICE not found — no image tag saved."
              continue
            fi

            IMAGE=$(aws ecs describe-task-definition \
              --task-definition "$TASK_DEF_ARN" \
              --query           'taskDefinition.containerDefinitions[0].image' \
              --output          text 2>/dev/null || echo "")

            if [ -z "$IMAGE" ] || [ "$IMAGE" = "None" ]; then
              echo "WARN: No image found in task def for $SERVICE — skipping."
              continue
            fi

            IMAGE_TAG="${IMAGE##*:}"
            aws ssm put-parameter \
              --name      "/orderflow/${ENV}/lifecycle/last-image-tag/${SERVICE}" \
              --value     "$IMAGE_TAG" \
              --type      "String" \
              --overwrite \
              --no-cli-pager
            echo "Saved $SERVICE image tag: $IMAGE_TAG"
          done

      # ── Step 2: Drain ECS services ───────────────────────────────────────────
      - name: Scale ECS services to 0
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.ids.outputs.cluster }}"

          for SERVICE in bff order-service invoice-service; do
            ACTIVE=$(aws ecs describe-services \
              --cluster  "$CLUSTER" \
              --services "$SERVICE" \
              --query    'services[?status==`ACTIVE`].serviceName' \
              --output   text 2>/dev/null || echo "")

            if [ -n "$ACTIVE" ]; then
              echo "Scaling $SERVICE → 0 ..."
              aws ecs update-service \
                --cluster      "$CLUSTER" \
                --service      "$SERVICE" \
                --desired-count 0 \
                --no-cli-pager
            else
              echo "Service $SERVICE not found / not active — skipping."
            fi
          done

      - name: Wait for Fargate tasks to drain (max 4 min)
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.ids.outputs.cluster }}"

          for i in $(seq 1 24); do
            RUNNING=$(aws ecs list-tasks \
              --cluster        "$CLUSTER" \
              --desired-status RUNNING \
              --query          'length(taskArns)' \
              --output         text 2>/dev/null || echo "0")
            echo "Running tasks: $RUNNING  (check $i/24)"
            [ "$RUNNING" = "0" ] && echo "All tasks drained." && break
            [ "$i"       = "24" ] && echo "FAIL: Timed out waiting for task drain." && exit 1
            sleep 10
          done

      - name: Delete ECS services
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.ids.outputs.cluster }}"

          for SERVICE in bff order-service invoice-service; do
            ACTIVE=$(aws ecs describe-services \
              --cluster  "$CLUSTER" \
              --services "$SERVICE" \
              --query    'services[?status==`ACTIVE`].serviceName' \
              --output   text 2>/dev/null || echo "")

            if [ -n "$ACTIVE" ]; then
              echo "Deleting service $SERVICE ..."
              aws ecs delete-service \
                --cluster  "$CLUSTER" \
                --service  "$SERVICE" \
                --force \
                --no-cli-pager
              echo "Deleted $SERVICE."
            else
              echo "Service $SERVICE not found — skipping."
            fi
          done

      # ── Step 3: RDS snapshot ─────────────────────────────────────────────────
      - name: Check RDS instance status
        id: rds
        run: |
          set -euo pipefail
          DB="${{ steps.ids.outputs.db_instance }}"
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB" \
            --query                  'DBInstances[0].DBInstanceStatus' \
            --output                 text 2>/dev/null || echo "not-found")
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "RDS $DB status: $STATUS"

      - name: Create manual RDS snapshot
        if: steps.rds.outputs.status == 'available'
        run: |
          set -euo pipefail
          DB="${{ steps.ids.outputs.db_instance }}"
          SNAP="${{ steps.ids.outputs.snapshot_id }}"
          echo "Creating snapshot $SNAP from $DB ..."
          aws rds create-db-snapshot \
            --db-instance-identifier "$DB" \
            --db-snapshot-identifier "$SNAP" \
            --no-cli-pager
          echo "Snapshot creation triggered."

      - name: Wait for snapshot to become available (max 30 min)
        if: steps.rds.outputs.status == 'available'
        run: |
          set -euo pipefail
          SNAP="${{ steps.ids.outputs.snapshot_id }}"
          echo "Waiting for snapshot $SNAP ..."
          aws rds wait db-snapshot-available \
            --db-snapshot-identifier "$SNAP"
          echo "Snapshot ready: $SNAP"

      - name: Save snapshot ID to SSM
        if: steps.rds.outputs.status == 'available'
        run: |
          set -euo pipefail
          ENV="${{ steps.ids.outputs.env }}"
          SNAP="${{ steps.ids.outputs.snapshot_id }}"
          aws ssm put-parameter \
            --name      "/orderflow/${ENV}/lifecycle/latest-snapshot" \
            --value     "$SNAP" \
            --type      "String" \
            --overwrite \
            --no-cli-pager
          echo "Snapshot ID saved to SSM: $SNAP"

      # ── Step 4: Terraform destroy (sequenced) ────────────────────────────────
      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      - name: "Destroy [1/2] — RDS instance (data already snapshotted)"
        working-directory: infra
        run: |
          terraform destroy -auto-approve -input=false \
            -target=aws_db_instance.main
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: "Destroy [2/2] — ALB (rules → listener → target groups → ALB)"
        working-directory: infra
        run: |
          terraform destroy -auto-approve -input=false \
            -target='aws_lb_listener_rule.services["bff"]' \
            -target=aws_lb_listener.http \
            -target='aws_lb_target_group.services["bff"]' \
            -target='aws_ssm_parameter.tg_arn["bff"]' \
            -target=aws_lb.main
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      # ── Step 5: Verify teardown ──────────────────────────────────────────────
      - name: Verify all expensive resources are destroyed
        run: |
          set -euo pipefail
          ENV="${{ steps.ids.outputs.env }}"
          PROJECT="orderflow"
          ERRORS=0

          echo "=== Teardown verification ==="

          ALB=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?LoadBalancerName=='${PROJECT}-alb-${ENV}'].LoadBalancerName" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ALB" ]; then
            echo "FAIL: ALB still exists — ${ALB}"
            ERRORS=$((ERRORS+1))
          else
            echo "OK  : ALB destroyed"
          fi

          DB=$(aws rds describe-db-instances \
            --db-instance-identifier "${PROJECT}-mysql-${ENV}" \
            --query                  'DBInstances[0].DBInstanceStatus' \
            --output                 text 2>/dev/null || echo "not-found")
          if [ "$DB" != "not-found" ]; then
            echo "FAIL: RDS still exists (status: ${DB})"
            ERRORS=$((ERRORS+1))
          else
            echo "OK  : RDS destroyed"
          fi

          # Sanity check: confirm no Fargate tasks are still billing.
          RUNNING_TASKS=$(aws ecs list-tasks \
            --cluster        "${PROJECT}-${ENV}" \
            --desired-status RUNNING \
            --query          'length(taskArns)' \
            --output         text 2>/dev/null || echo "0")
          if [ "$RUNNING_TASKS" != "0" ]; then
            echo "FAIL: ${RUNNING_TASKS} Fargate task(s) still running"
            ERRORS=$((ERRORS+1))
          else
            echo "OK  : No Fargate tasks running"
          fi

          if [ "$ERRORS" -gt "0" ]; then
            echo ""
            echo "FAIL: $ERRORS resource(s) were not destroyed. Review Terraform state."
            exit 1
          fi

          echo ""
          echo "SUCCESS: All billable resources confirmed destroyed."

      - name: Teardown summary
        if: always()
        run: |
          echo "=============================="
          echo " TEARDOWN SUMMARY"
          echo "=============================="
          echo " Environment : ${{ inputs.environment }}"
          echo " Snapshot ID : ${{ steps.ids.outputs.snapshot_id }}"
          echo " SSM path    : /orderflow/${{ inputs.environment }}/lifecycle/latest-snapshot"
          echo ""
          echo " Preserved: VPC, subnets, security groups, ECS cluster + capacity"
          echo "   provider, Cloud Map, ECR repos, S3, CloudFront, IAM, SSM params."
          echo ""
          echo " To restart: Run this workflow with action=startup"
          echo "=============================="


  # ── STARTUP PLAN (read-only) ─────────────────────────────────────────────────
  # Read-only preview of the resources that will be recreated and the image
  # tags the apply job will redeploy. Runs immediately, no approval.
  startup-plan:
    name: "Startup plan — ${{ inputs.environment }}"
    if: inputs.action == 'startup'
    needs: preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve resource identifiers
        id: ids
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          echo "env=${ENV}" >> $GITHUB_OUTPUT

      - name: Load snapshot ID and image tags from SSM
        id: ssm
        run: |
          set -euo pipefail
          ENV="${{ steps.ids.outputs.env }}"

          SNAPSHOT_ID=$(aws ssm get-parameter \
            --name    "/orderflow/${ENV}/lifecycle/latest-snapshot" \
            --query   'Parameter.Value' \
            --output  text 2>/dev/null || echo "")

          echo "snapshot_id=${SNAPSHOT_ID}" >> $GITHUB_OUTPUT

          echo "=============================================="
          echo " SAVED STATE FROM PREVIOUS TEARDOWN"
          echo "=============================================="
          if [ -n "$SNAPSHOT_ID" ]; then
            echo "  RDS snapshot to restore : $SNAPSHOT_ID"
          else
            echo "  RDS snapshot to restore : (none — fresh empty DB)"
          fi

          MISSING=0
          for SERVICE in bff order-service invoice-service; do
            TAG=$(aws ssm get-parameter \
              --name   "/orderflow/${ENV}/lifecycle/last-image-tag/${SERVICE}" \
              --query  'Parameter.Value' \
              --output text 2>/dev/null || echo "")
            if [ -n "$TAG" ]; then
              echo "  $SERVICE image tag       : $TAG"
            else
              echo "  $SERVICE image tag       : MISSING"
              MISSING=$((MISSING+1))
            fi
          done

          if [ "$MISSING" -gt "0" ]; then
            echo ""
            echo "FAIL: $MISSING image tag(s) missing from SSM. Startup cannot"
            echo "      proceed without them. Deploy the services manually,"
            echo "      then run a teardown, then a startup."
            exit 1
          fi

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      - name: "Generate startup plan"
        working-directory: infra
        run: |
          set -euo pipefail
          SNAPSHOT_ID="${{ steps.ssm.outputs.snapshot_id }}"

          if [ -n "$SNAPSHOT_ID" ]; then
            terraform plan -input=false -no-color -out=startup.tfplan \
              -var="db_snapshot_identifier=${SNAPSHOT_ID}"
          else
            terraform plan -input=false -no-color -out=startup.tfplan
          fi
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: "Startup plan — human-readable summary"
        working-directory: infra
        run: |
          set -euo pipefail
          echo "=============================================="
          echo " TERRAFORM RESOURCES TO BE CREATED / CHANGED"
          echo "=============================================="
          terraform show -no-color startup.tfplan \
            | grep -E "^\s*#|^Plan:" \
            | head -80 \
            || true
          echo ""
          echo "=============================================="
          echo " WHAT HAPPENS NEXT"
          echo "=============================================="
          echo " 1. The 'Startup apply' job is waiting for human approval."
          echo " 2. Open this run in the GitHub UI → 'Review deployments'"
          echo "    → Approve to proceed, or Reject to abort safely."
          echo " 3. On approve: ALB + RDS (from snapshot) are recreated,"
          echo "    then services are redeployed with the saved image tags."
          echo " 4. On reject: nothing is created — the plan is discarded."
          echo "=============================================="


  # ── STARTUP APPLY (creates resources, gated by environment approval) ─────────
  startup-apply:
    name: "Startup apply — ${{ inputs.environment }}"
    if: inputs.action == 'startup'
    needs: [preflight, startup-plan]
    runs-on: ubuntu-latest
    environment: infra-approver-list
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up Python (for service deploy)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install boto3 pyyaml

      - name: Resolve resource identifiers
        id: ids
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          PROJECT="orderflow"
          echo "cluster=${PROJECT}-${ENV}"          >> $GITHUB_OUTPUT
          echo "db_instance=${PROJECT}-mysql-${ENV}" >> $GITHUB_OUTPUT
          echo "env=${ENV}"                          >> $GITHUB_OUTPUT

      - name: Load snapshot ID and image tags from SSM
        id: ssm
        run: |
          set -euo pipefail
          ENV="${{ steps.ids.outputs.env }}"

          SNAPSHOT_ID=$(aws ssm get-parameter \
            --name    "/orderflow/${ENV}/lifecycle/latest-snapshot" \
            --query   'Parameter.Value' \
            --output  text 2>/dev/null || echo "")
          echo "snapshot_id=${SNAPSHOT_ID}" >> $GITHUB_OUTPUT

          for SERVICE in bff order-service invoice-service; do
            TAG=$(aws ssm get-parameter \
              --name   "/orderflow/${ENV}/lifecycle/last-image-tag/${SERVICE}" \
              --query  'Parameter.Value' \
              --output text 2>/dev/null || echo "")

            VAR=$(echo "$SERVICE" | tr '-' '_')
            echo "${VAR}_tag=${TAG}" >> $GITHUB_OUTPUT
          done

      - name: Verify image tags are available
        run: |
          set -euo pipefail
          MISSING=0

          BFF_TAG="${{ steps.ssm.outputs.bff_tag }}"
          ORDER_TAG="${{ steps.ssm.outputs.order_service_tag }}"
          INVOICE_TAG="${{ steps.ssm.outputs.invoice_service_tag }}"

          [ -z "$BFF_TAG"     ] && echo "FAIL: No saved image tag for bff"             && MISSING=$((MISSING+1))
          [ -z "$ORDER_TAG"   ] && echo "FAIL: No saved image tag for order-service"   && MISSING=$((MISSING+1))
          [ -z "$INVOICE_TAG" ] && echo "FAIL: No saved image tag for invoice-service" && MISSING=$((MISSING+1))

          if [ "$MISSING" -gt "0" ]; then
            echo ""
            echo "Missing $MISSING image tag(s). This happens when startup is run"
            echo "without a prior teardown (which saves the tags)."
            echo ""
            echo "Fix: deploy all services manually first, then run teardown,"
            echo "     which saves the tags. Then startup will work."
            exit 1
          fi

          echo "All image tags verified."

      # ── Terraform — recreate ALB + RDS ───────────────────────────────────────
      # We regenerate the plan here (rather than passing the file from the
      # startup-plan job) so the apply uses a fresh plan against current state,
      # avoiding stale-plan rejections when the approval gate has been held
      # open for a while.
      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      - name: "Apply — recreate ALB + RDS"
        working-directory: infra
        run: |
          set -euo pipefail
          SNAPSHOT_ID="${{ steps.ssm.outputs.snapshot_id }}"
          echo "Applying... RDS restore may take 10-15 minutes."
          if [ -n "$SNAPSHOT_ID" ]; then
            terraform apply -auto-approve -input=false \
              -var="db_snapshot_identifier=${SNAPSHOT_ID}"
          else
            terraform apply -auto-approve -input=false
          fi
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      # ── Deploy all services using saved image tags ───────────────────────────
      - name: Deploy services using saved image tags
        run: |
          set -euo pipefail
          ENV="${{ steps.ids.outputs.env }}"

          BFF_TAG="${{ steps.ssm.outputs.bff_tag }}"
          ORDER_TAG="${{ steps.ssm.outputs.order_service_tag }}"
          INVOICE_TAG="${{ steps.ssm.outputs.invoice_service_tag }}"

          deploy_service() {
            local SERVICE="$1"
            local TAG="$2"

            echo ""
            echo "=== Deploying $SERVICE (tag: $TAG) ==="

            echo "  Rendering manifests..."
            python deploy/render.py \
              --service   "$SERVICE" \
              --env       "$ENV" \
              --image-tag "$TAG"

            echo "  Applying to AWS..."
            python deploy/apply.py \
              --service "$SERVICE" \
              --env     "$ENV"

            echo "  $SERVICE deployed successfully."
          }

          # Deploy in dependency order: internal services first, BFF last
          # (BFF calls order-service and invoice-service, so they should be up first)
          deploy_service "order-service"   "$ORDER_TAG"
          deploy_service "invoice-service" "$INVOICE_TAG"
          deploy_service "bff"             "$BFF_TAG"

      # ── Wait for services to reach steady state ──────────────────────────────
      - name: Wait for Fargate services to stabilize (max 10 min each)
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.ids.outputs.cluster }}"

          SERVICES=()
          for SERVICE in bff order-service invoice-service; do
            ACTIVE=$(aws ecs describe-services \
              --cluster  "$CLUSTER" \
              --services "$SERVICE" \
              --query    'services[?status==`ACTIVE`].serviceName' \
              --output   text 2>/dev/null || echo "")
            [ -n "$ACTIVE" ] && SERVICES+=("$SERVICE")
          done

          if [ "${#SERVICES[@]}" -eq "0" ]; then
            echo "WARN: No active services found to wait on."
            exit 0
          fi

          echo "Waiting for services to stabilize: ${SERVICES[*]}"
          aws ecs wait services-stable \
            --cluster  "$CLUSTER" \
            --services "${SERVICES[@]}"
          echo "All services stable."

      # ── Verify startup ───────────────────────────────────────────────────────
      - name: Verify all resources are healthy
        run: |
          set -euo pipefail
          ENV="${{ steps.ids.outputs.env }}"
          PROJECT="orderflow"
          ERRORS=0

          echo "=== Startup verification ==="

          ALB=$(aws elbv2 describe-load-balancers \
            --query  "LoadBalancers[?LoadBalancerName=='${PROJECT}-alb-${ENV}'].State.Code" \
            --output text 2>/dev/null || echo "")
          if [ "$ALB" = "active" ]; then
            echo "OK  : ALB is active"
          else
            echo "FAIL: ALB not active (state: '${ALB}')"
            ERRORS=$((ERRORS+1))
          fi

          DB=$(aws rds describe-db-instances \
            --db-instance-identifier "${PROJECT}-mysql-${ENV}" \
            --query                  'DBInstances[0].DBInstanceStatus' \
            --output                 text 2>/dev/null || echo "not-found")
          if [ "$DB" = "available" ]; then
            echo "OK  : RDS is available"
          else
            echo "FAIL: RDS not available (status: '${DB}')"
            ERRORS=$((ERRORS+1))
          fi

          # Check that at least one task per service is actually running.
          for SERVICE in bff order-service invoice-service; do
            RUNNING=$(aws ecs describe-services \
              --cluster  "${PROJECT}-${ENV}" \
              --services "$SERVICE" \
              --query    'services[0].runningCount' \
              --output   text 2>/dev/null || echo "0")
            if [ "$RUNNING" -ge "1" ]; then
              echo "OK  : $SERVICE has $RUNNING running task(s)"
            else
              echo "FAIL: $SERVICE has no running tasks"
              ERRORS=$((ERRORS+1))
            fi
          done

          if [ "$ERRORS" -gt "0" ]; then
            echo ""
            echo "FAIL: $ERRORS verification check(s) failed."
            exit 1
          fi

          echo ""
          echo "SUCCESS: All resources verified — platform is up and running."

      - name: Startup summary
        run: |
          echo "=============================="
          echo " STARTUP SUMMARY"
          echo "=============================="
          echo " Environment   : ${{ inputs.environment }}"
          echo " Snapshot used : ${{ steps.ssm.outputs.snapshot_id || 'none (fresh DB)' }}"
          echo " bff tag       : ${{ steps.ssm.outputs.bff_tag }}"
          echo " order tag     : ${{ steps.ssm.outputs.order_service_tag }}"
          echo " invoice tag   : ${{ steps.ssm.outputs.invoice_service_tag }}"
          echo ""
          echo " All services deployed and stable."
          echo " CloudFront URL is still active — your UI is accessible."
          echo "=============================="
