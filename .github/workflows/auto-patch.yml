name: Auto-Patch — Dev Deploy & Health Verify

# ── Responsibility ─────────────────────────────────────────────────────────────
# Triggered by the AI Vulnerability Agent (Phase 3) via workflow_dispatch.
#
# Flow:
#   1. Check out the auto-patch feature branch (already has bumped requirements.txt)
#   2. Build Docker image and push to ECR
#   3. Deploy to dev only (no approval gate)
#   4. Run 3-layer health verification:
#        a. ECS runningCount == desiredCount
#        b. ALB target health == "healthy"
#        c. CloudWatch startup log contains "Application startup complete", no errors
#   5. Collect evidence (task ARN, log excerpt, timestamps, check results)
#   6. Call back to Lambda with DEV_HEALTHY or DEV_FAILED + evidence JSON
#
# After DEV_HEALTHY callback:
#   Lambda creates PR to main with AI reasoning + evidence embedded in PR body.
#   Human reviews the PR and approves for prod.
#
# After DEV_FAILED callback:
#   Lambda deletes the feature branch and marks the vulnerability DEV_FAILED.
#   UI shows red alert. No PR is raised.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to patch (bff | order-service | invoice-service)"
        required: true
        type: string
      branch:
        description: "Feature branch to build from (fix/auto-patch-{service}-{date})"
        required: true
        type: string
      scan_id:
        description: "Scan ID from DynamoDB (for callback)"
        required: true
        type: string
      record_ids:
        description: "JSON array of record IDs to update (e.g. [\"CVE-xxx#bff#pkg\"])"
        required: true
        type: string
      patches_json:
        description: "JSON map of package → safe version (e.g. {\"python-dotenv\":\"1.2.2\"})"
        required: true
        type: string
      validation_plan_json:
        description: "JSON array of AI validation plan steps"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:   us-east-1
  ENV:          dev
  CLUSTER:      orderflow-dev
  LAMBDA_NAME:  orderflow-vulnerability-agent-dev
  DEV_BASE_URL: https://orderflow.gleeze.com

jobs:

  build-deploy-verify:
    name: Build → Deploy dev → Health check → Callback
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout feature branch ───────────────────────────────────────────
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      # ── 2. Configure AWS ─────────────────────────────────────────────────────
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── 3. Build & push Docker image ─────────────────────────────────────────
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SERVICE:      ${{ inputs.service }}
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE="$ECR_REGISTRY/orderflow/$SERVICE:autopatch-$IMAGE_TAG"
          docker build -t "$IMAGE" "backend-services/$SERVICE/"
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "image_tag=autopatch-$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Built and pushed: $IMAGE"

      - name: Verify patch in image + collect artifact evidence
        id: artifact-evidence
        env:
          SERVICE:      ${{ inputs.service }}
          IMAGE:        ${{ steps.build.outputs.image }}
          IMAGE_TAG:    ${{ steps.build.outputs.image_tag }}
          PATCHES_JSON: ${{ inputs.patches_json }}
        run: |
          VERIFY_JSON=$(python3 - <<'PY'
          import json, os, subprocess

          patches = json.loads(os.environ.get("PATCHES_JSON", "{}") or "{}")
          image   = os.environ["IMAGE"]

          results = []
          all_ok  = True

          for pkg, expected in patches.items():
              proc = subprocess.run(
                  [
                      "docker", "run", "--rm", image,
                      "python", "-c",
                      f"import importlib.metadata as m; print(m.version('{pkg}'))"
                  ],
                  capture_output=True, text=True
              )
              found = proc.stdout.strip() if proc.returncode == 0 else ""
              ok    = (proc.returncode == 0 and found == expected)
              if not ok:
                  all_ok = False
              results.append({
                  "package": pkg,
                  "expected": expected,
                  "found": found or "not_found",
                  "ok": ok,
              })

          print(json.dumps({"all_ok": all_ok, "results": results}, separators=(",", ":")))
          PY
          )

          VERIFY_B64=$(printf "%s" "$VERIFY_JSON" | python3 -c 'import base64,sys; print(base64.b64encode(sys.stdin.read().encode()).decode())')

          REPO_NAME="orderflow/$SERVICE"
          ECR_DIGEST=""
          for i in {1..8}; do
            ECR_DIGEST=$(aws ecr describe-images \
              --repository-name "$REPO_NAME" \
              --image-ids imageTag="$IMAGE_TAG" \
              --region "${{ env.AWS_REGION }}" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || echo "")
            [ -n "$ECR_DIGEST" ] && [ "$ECR_DIGEST" != "None" ] && break
            sleep 5
          done

          VERIFY_OK=$(printf "%s" "$VERIFY_JSON" | python3 -c 'import json,sys; print(str(bool(json.loads(sys.stdin.read()).get("all_ok", False))).lower())')

          echo "patch_verify_ok=$VERIFY_OK"             >> $GITHUB_OUTPUT
          echo "patch_verify_b64=$VERIFY_B64"           >> $GITHUB_OUTPUT
          echo "ecr_image_digest=$ECR_DIGEST"           >> $GITHUB_OUTPUT
          echo "source_branch=${{ inputs.branch }}"     >> $GITHUB_OUTPUT
          echo "source_commit=${{ github.sha }}"        >> $GITHUB_OUTPUT
          echo "source_commit_short=${GITHUB_SHA::7}"   >> $GITHUB_OUTPUT

      # ── 4. Deploy to dev ─────────────────────────────────────────────────────
      - name: Set up Python (for deploy scripts)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deploy dependencies
        run: pip install boto3 pyyaml

      - name: Render manifests
        run: |
          python deploy/render.py \
            --service   ${{ inputs.service }} \
            --env       ${{ env.ENV }} \
            --image-tag ${{ steps.build.outputs.image_tag }}

      - name: Apply to AWS (dev — no approval gate)
        run: |
          python deploy/apply.py \
            --service ${{ inputs.service }} \
            --env     ${{ env.ENV }}

      # ── 5. Wait for ECS stability ─────────────────────────────────────────────
      - name: Wait for ECS service to stabilise
        run: |
          echo "Waiting for ${{ inputs.service }} to stabilise in ${{ env.ENV }}..."
          aws ecs wait services-stable \
            --cluster  ${{ env.CLUSTER }} \
            --services ${{ inputs.service }} \
            --region   ${{ env.AWS_REGION }}
          echo "ECS service stabilised."

      # ── 6. Health check layer 1: ECS task count ───────────────────────────────
      - name: Health check — ECS running count
        id: ecs-check
        run: |
          RUNNING=$(aws ecs describe-services \
            --cluster  ${{ env.CLUSTER }} \
            --services ${{ inputs.service }} \
            --region   ${{ env.AWS_REGION }} \
            --query    'services[0].runningCount' --output text)
          DESIRED=$(aws ecs describe-services \
            --cluster  ${{ env.CLUSTER }} \
            --services ${{ inputs.service }} \
            --region   ${{ env.AWS_REGION }} \
            --query    'services[0].desiredCount' --output text)

          echo "ecs_running=$RUNNING" >> $GITHUB_OUTPUT
          echo "ecs_desired=$DESIRED" >> $GITHUB_OUTPUT

          echo "ECS: running=$RUNNING desired=$DESIRED"
          if [ "$RUNNING" == "$DESIRED" ] && [ "$DESIRED" != "0" ]; then
            echo "ecs_ok=true" >> $GITHUB_OUTPUT
          else
            echo "ecs_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::ECS task count mismatch (running=$RUNNING, desired=$DESIRED)"
          fi

      # ── 7. Health check layer 2: ALB target health ────────────────────────────
      - name: Health check — ALB target health
        id: alb-check
        run: |
          # Look up target group by tag (service name)
          TG_ARN=$(aws elbv2 describe-target-groups \
            --region ${{ env.AWS_REGION }} \
            --query "TargetGroups[?contains(TargetGroupName, '${{ inputs.service }}')].TargetGroupArn | [0]" \
            --output text 2>/dev/null || echo "None")

          if [ "$TG_ARN" = "None" ] || [ -z "$TG_ARN" ]; then
            echo "alb_state=skipped" >> $GITHUB_OUTPUT
            echo "alb_ok=true"       >> $GITHUB_OUTPUT
            echo "::notice::ALB target group not found for ${{ inputs.service }} — skipping ALB check"
          else
            ALB_STATE="unknown"
            # During ECS rolling deploy, targets often pass through "initial" or
            # "draining" before becoming healthy. Give ALB up to ~5 minutes.
            for i in {1..30}; do
              ALB_STATE=$(aws elbv2 describe-target-health \
                --target-group-arn "$TG_ARN" \
                --region           ${{ env.AWS_REGION }} \
                --query            'TargetHealthDescriptions[0].TargetHealth.State' \
                --output text 2>/dev/null || echo "unknown")
              echo "ALB target state (attempt $i): $ALB_STATE"
              if [ "$ALB_STATE" = "healthy" ]; then
                break
              fi
              if [ "$ALB_STATE" = "draining" ] || [ "$ALB_STATE" = "initial" ]; then
                echo "::notice::ALB in transitional state ($ALB_STATE) — waiting for healthy"
              fi
              sleep 10
            done
            echo "alb_state=$ALB_STATE" >> $GITHUB_OUTPUT
            if [ "$ALB_STATE" = "healthy" ]; then
              echo "alb_ok=true" >> $GITHUB_OUTPUT
            else
              echo "alb_ok=false" >> $GITHUB_OUTPUT
              echo "::warning::ALB target not healthy: $ALB_STATE"
            fi
          fi

      # ── 8. Health check layer 3: CloudWatch startup logs ─────────────────────
      - name: Health check — CloudWatch startup logs
        id: log-check
        env:
          PATCHES_JSON: ${{ inputs.patches_json }}
        run: |
          SERVICE="${{ inputs.service }}"
          LOG_GROUP="/ecs/orderflow/${{ env.ENV }}/${SERVICE}"

          # Get the newest running task
          TASK_ARN=$(aws ecs list-tasks \
            --cluster  ${{ env.CLUSTER }} \
            --service-name "$SERVICE" \
            --region   ${{ env.AWS_REGION }} \
            --query    'taskArns[0]' --output text 2>/dev/null || echo "None")

          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

          if [ "$TASK_ARN" = "None" ] || [ -z "$TASK_ARN" ]; then
            echo "startup_log_ok=false" >> $GITHUB_OUTPUT
            echo "error_log_ok=true"    >> $GITHUB_OUTPUT
            echo "log_excerpt=No running task found" >> $GITHUB_OUTPUT
            echo "::warning::No running task found for $SERVICE — ECS/ALB checks still apply"
            exit 0
          fi

          TASK_ID=$(basename "$TASK_ARN")
          LOG_STREAM="${{ env.ENV }}/${SERVICE}/${TASK_ID}"

          RUNNING_DIGEST=$(aws ecs describe-tasks \
            --cluster "${{ env.CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --region "${{ env.AWS_REGION }}" \
            --query 'tasks[0].containers[0].imageDigest' \
            --output text 2>/dev/null || echo "")
          echo "running_image_digest=$RUNNING_DIGEST" >> $GITHUB_OUTPUT

          # Wait briefly for logs to appear
          sleep 5

          LOGS=$(aws logs get-log-events \
            --log-group-name  "$LOG_GROUP" \
            --log-stream-name "$LOG_STREAM" \
            --limit           80 \
            --region          ${{ env.AWS_REGION }} \
            --query           'events[*].message' \
            --output          text 2>/dev/null || echo "")

          echo "=== CloudWatch log excerpt ==="
          echo "$LOGS" | head -40
          export LOGS

          # Runtime patch verification from LIVE container logs (best-effort).
          # If service logs don't emit package markers for all patched packages,
          # this check should not be treated as a hard failure signal.
          # Marker format:
          #   RUNTIME_DEP_VERSION python-dotenv=1.2.2
          RUNTIME_VERIFY_JSON=$(python3 - <<'PY'
          import json, os, re
          logs = os.environ.get("LOGS", "")
          patches = json.loads(os.environ.get("PATCHES_JSON", "{}") or "{}")
          found = {}
          for m in re.finditer(r"RUNTIME_DEP_VERSION\s+([A-Za-z0-9_.\-]+)=([^\s]+)", logs):
              found[m.group(1).lower().replace("_", "-")] = m.group(2)
          results = []
          all_ok = True
          checked = 0
          for pkg, expected in patches.items():
              key = pkg.lower().replace("_", "-")
              if key not in found:
                  results.append({
                      "package": pkg,
                      "expected": expected,
                      "found": "not_checked_no_runtime_marker",
                      "ok": None
                  })
                  continue
              got = found.get(key)
              ok = (got == expected)
              checked += 1
              if not ok:
                  all_ok = False
              results.append({
                  "package": pkg,
                  "expected": expected,
                  "found": got,
                  "ok": ok
              })
          # Best-effort mode: if no runtime markers were present, don't fail.
          overall_ok = all_ok if checked > 0 else True
          print(json.dumps({
              "all_ok": overall_ok,
              "best_effort": True,
              "checked": checked,
              "total": len(patches),
              "results": results
          }, separators=(",", ":")))
          PY
          )
          RUNTIME_VERIFY_B64=$(printf "%s" "$RUNTIME_VERIFY_JSON" | python3 -c 'import base64,sys;print(base64.b64encode(sys.stdin.read().encode()).decode())')
          RUNTIME_VERIFY_OK=$(printf "%s" "$RUNTIME_VERIFY_JSON" | python3 -c 'import json,sys;print(str(bool(json.loads(sys.stdin.read()).get("all_ok", False))).lower())')
          echo "runtime_verify_ok=$RUNTIME_VERIFY_OK" >> $GITHUB_OUTPUT
          echo "runtime_verify_b64=$RUNTIME_VERIFY_B64" >> $GITHUB_OUTPUT

          # Check for startup signature
          if echo "$LOGS" | grep -q "Application startup complete"; then
            echo "startup_log_ok=true" >> $GITHUB_OUTPUT
            echo "::notice::Startup log signature found ✅"
          else
            echo "startup_log_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Startup log signature NOT found"
          fi

          # Check for error indicators
          if echo "$LOGS" | grep -qiE "^(ERROR|CRITICAL):|ImportError|ModuleNotFoundError|traceback"; then
            echo "error_log_ok=false" >> $GITHUB_OUTPUT
            echo "::warning::Error lines detected in startup logs"
          else
            echo "error_log_ok=true" >> $GITHUB_OUTPUT
          fi

          # Save excerpt for evidence (escape newlines for JSON)
          EXCERPT=$(echo "$LOGS" | head -20 | tr '\n' '|')
          echo "log_excerpt=$EXCERPT" >> $GITHUB_OUTPUT

      # ── 8b. Dynamic validation execution evidence (best-effort) ───────────────
      - name: Validation checks — execute AI plan (best-effort)
        id: validation-checks
        env:
          SERVICE:              ${{ inputs.service }}
          DEV_BASE_URL:         ${{ env.DEV_BASE_URL }}
          VALIDATION_PLAN_JSON: ${{ inputs.validation_plan_json }}
          STARTUP_LOG_OK:       ${{ steps.log-check.outputs.startup_log_ok }}
          ERROR_LOG_OK:         ${{ steps.log-check.outputs.error_log_ok }}
          LOG_EXCERPT:          ${{ steps.log-check.outputs.log_excerpt }}
          RUNTIME_VERIFY_OK:    ${{ steps.log-check.outputs.runtime_verify_ok }}
        run: |
          VALIDATION_JSON=$(python3 - <<'PY'
          import json, os, time, urllib.request, urllib.error

          service = os.environ.get("SERVICE", "")
          base_url = (os.environ.get("DEV_BASE_URL", "https://orderflow.gleeze.com") or "").rstrip("/")
          raw_plan = os.environ.get("VALIDATION_PLAN_JSON", "") or "[]"
          startup_ok = str(os.environ.get("STARTUP_LOG_OK", "false")).lower() == "true"
          error_ok = str(os.environ.get("ERROR_LOG_OK", "false")).lower() == "true"
          runtime_ok = str(os.environ.get("RUNTIME_VERIFY_OK", "false")).lower() == "true"
          log_excerpt = (os.environ.get("LOG_EXCERPT", "") or "").replace("|", "\n")

          try:
              plan = json.loads(raw_plan) if raw_plan.strip() else []
              if not isinstance(plan, list):
                  plan = []
          except Exception:
              plan = []

          if not plan:
              plan = [
                  "Confirm service health endpoint after deployment",
                  "Check startup logs for new warnings/errors",
                  "Validate config/env parsing and startup dependency initialization",
              ]
              if service == "bff":
                  plan.extend([
                      "Run login/token refresh smoke",
                      "Call one downstream order endpoint via BFF",
                  ])

          checks = []

          def add_check(name, result, summary, endpoint="", expected_status=None, actual_status=None, response_time_ms=None, response_body="", logs=""):
              checks.append({
                  "check_name": name,
                  "endpoint": endpoint,
                  "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "expected_status": expected_status,
                  "actual_status": actual_status,
                  "response_time_ms": response_time_ms,
                  "result": result,
                  "summary": summary,
                  "response": response_body[:1200] if isinstance(response_body, str) else response_body,
                  "logs": logs[:1200] if isinstance(logs, str) else logs,
              })

          def http_check(name, endpoint, expected=200, acceptable=None):
              url = f"{base_url}{endpoint}"
              start = time.time()
              acceptable = set(acceptable or [expected])
              try:
                  req = urllib.request.Request(url, method="GET")
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      body = resp.read().decode("utf-8", errors="ignore")
                      status = int(resp.status)
              except urllib.error.HTTPError as e:
                  body = (e.read().decode("utf-8", errors="ignore") if e.fp else "") or str(e)
                  status = int(e.code)
              except Exception as e:
                  elapsed_ms = int((time.time() - start) * 1000)
                  add_check(
                      name=name,
                      result="WARN",
                      summary=f"Request failed: {e}",
                      endpoint=f"GET {url}",
                      expected_status=expected,
                      actual_status=0,
                      response_time_ms=elapsed_ms,
                      response_body=str(e),
                  )
                  return

              elapsed_ms = int((time.time() - start) * 1000)
              if status in acceptable:
                  result = "PASS"
                  if status == expected:
                      summary = f"GET {endpoint} returned {status} in {elapsed_ms}ms"
                  else:
                      summary = f"GET {endpoint} returned acceptable auth/guard status {status} in {elapsed_ms}ms"
              elif status in (404,):
                  result = "WARN"
                  summary = f"GET {endpoint} returned {status}; endpoint may differ by service"
              elif status >= 500:
                  result = "FAIL"
                  summary = f"GET {endpoint} returned server error {status}"
              else:
                  result = "WARN"
                  summary = f"GET {endpoint} returned unexpected status {status}"
              add_check(
                  name=name,
                  result=result,
                  summary=summary,
                  endpoint=f"GET {url}",
                  expected_status=expected,
                  actual_status=status,
                  response_time_ms=elapsed_ms,
                  response_body=body,
              )

          def service_probe():
              # Probe endpoints that represent each service's reachable path in dev.
              if service == "bff":
                  # /health at domain root is served by frontend CloudFront behavior.
                  # Use an /api path so request is routed to BFF via ALB.
                  return ("BFF API Reachability", "/api/orders?limit=1", 200)
              if service == "order-service":
                  return ("Order Service Probe (via BFF)", "/api/orders", 200)
              if service == "invoice-service":
                  return ("Invoice Service Probe (via BFF)", "/api/invoices", 200)
              return ("Service Probe", "/health", 200)

          for step in plan:
              s = (step or "").strip()
              low = s.lower()
              if not s:
                  continue
              if "health endpoint" in low:
                  name, endpoint, expected = service_probe()
                  # Health probes for protected paths may return auth guard (401/403) while still proving reachability.
                  acceptable = [200, 401, 403] if endpoint.startswith("/api/") else [200]
                  http_check(name, endpoint, expected=expected, acceptable=acceptable)
              elif "startup logs" in low:
                  if startup_ok and error_ok:
                      add_check("Startup Logs Health", "PASS", "Startup signature found and no error lines", logs=log_excerpt)
                  elif error_ok:
                      add_check("Startup Logs Health", "WARN", "Startup signature missing but no error lines detected", logs=log_excerpt)
                  else:
                      add_check("Startup Logs Health", "FAIL", "Error lines detected in startup logs", logs=log_excerpt)
              elif "login/token refresh" in low:
                  # Best-effort proxy smoke through BFF routes.
                  http_check("Login/Token Refresh Smoke (proxy check)", "/api/orders", expected=200, acceptable=[200, 401, 403])
              elif "downstream order endpoint" in low:
                  http_check("BFF Downstream Order Endpoint", "/api/orders?limit=1", expected=200, acceptable=[200, 401, 403])
              elif "generate one invoice via api" in low:
                  http_check("Invoice Generate/API Reachability", "/api/invoices", expected=200, acceptable=[200, 401, 403])
              elif "invoice status retrieval" in low:
                  http_check("Invoice Status Retrieval", "/api/invoices?status=pending", expected=200, acceptable=[200, 401, 403])
              elif "create and fetch an order" in low:
                  http_check("Order Create/Fetch Reachability", "/api/orders", expected=200, acceptable=[200, 401, 403])
              elif "db write/read path" in low:
                  http_check("Order DB Path Probe", "/api/orders?limit=1", expected=200, acceptable=[200, 401, 403])
              elif "config/env parsing" in low or "startup dependency initialization" in low:
                  if runtime_ok:
                      add_check("Config/Env Parsing Validation", "PASS", "Runtime dependency marker verification passed", logs=log_excerpt)
                  else:
                      add_check("Config/Env Parsing Validation", "WARN", "Runtime marker missing (best-effort check)", logs=log_excerpt)
              else:
                  add_check(s, "WARN", "Plan step not auto-executed in CI yet")

          fail_count = sum(1 for c in checks if c["result"] == "FAIL")
          warn_count = sum(1 for c in checks if c["result"] == "WARN")
          pass_count = sum(1 for c in checks if c["result"] == "PASS")
          overall = "FAIL" if fail_count > 0 else ("PASS_WITH_WARNINGS" if warn_count > 0 else "PASS")
          out = {
              "plan": plan,
              "checks": checks,
              "summary": {"pass": pass_count, "warn": warn_count, "fail": fail_count},
              "overall": overall,
              "best_effort": True,
          }
          print(json.dumps(out, separators=(",", ":")))
          PY
          )
          VALIDATION_B64=$(printf "%s" "$VALIDATION_JSON" | python3 -c 'import base64,sys;print(base64.b64encode(sys.stdin.read().encode()).decode())')
          VALIDATION_OVERALL=$(printf "%s" "$VALIDATION_JSON" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read()).get("overall","PASS_WITH_WARNINGS"))')
          echo "validation_results_b64=$VALIDATION_B64" >> $GITHUB_OUTPUT
          echo "validation_overall=$VALIDATION_OVERALL" >> $GITHUB_OUTPUT

      # ── 9. Determine overall health status ───────────────────────────────────
      - name: Evaluate overall health
        id: health
        run: |
          ECS_OK="${{ steps.ecs-check.outputs.ecs_ok }}"
          ALB_OK="${{ steps.alb-check.outputs.alb_ok }}"
          LOG_OK="${{ steps.log-check.outputs.startup_log_ok }}"
          ERR_OK="${{ steps.log-check.outputs.error_log_ok }}"
          ECR_DIGEST="${{ steps.artifact-evidence.outputs.ecr_image_digest }}"
          ECS_DIGEST="${{ steps.log-check.outputs.running_image_digest }}"

          DIGEST_MATCH="false"
          if [ -n "$ECR_DIGEST" ] && [ "$ECR_DIGEST" != "None" ] && [ -n "$ECS_DIGEST" ] && [ "$ECS_DIGEST" != "None" ] && [ "$ECR_DIGEST" = "$ECS_DIGEST" ]; then
            DIGEST_MATCH="true"
          fi
          echo "digest_match=$DIGEST_MATCH" >> $GITHUB_OUTPUT

          echo "Health summary: ECS=$ECS_OK  ALB=$ALB_OK  STARTUP_LOG=$LOG_OK  ERROR_CHECK=$ERR_OK"

          # STARTUP_LOG is advisory-only — a missing signature just means logs weren't
          # readable (log group name mismatch, cold-start timing, etc.). ECS running +
          # ALB healthy + no error lines is sufficient proof of a healthy service.
          if [ "$ECS_OK" = "true" ] && [ "$ALB_OK" = "true" ] && [ "$ERR_OK" = "true" ]; then
            echo "status=DEV_HEALTHY" >> $GITHUB_OUTPUT
            if [ "$LOG_OK" = "true" ]; then
              echo "All health checks passed ✅"
            else
              echo "ECS + ALB healthy ✅ (startup log signature not found — advisory warning only)"
            fi
          else
            echo "status=DEV_FAILED"  >> $GITHUB_OUTPUT
            echo "::error::One or more health checks failed — DEV_FAILED"
          fi

      # ── 10. Callback to Lambda with evidence ──────────────────────────────────
      - name: Callback — notify vulnerability agent
        if: always()
        run: |
          STATUS="${{ steps.health.outputs.status }}"
          VERIFIED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Escape log excerpt for JSON
          LOG_EXCERPT=$(echo "${{ steps.log-check.outputs.log_excerpt }}" | sed 's/|/\\n/g' | sed 's/"/\\"/g')

          EVIDENCE=$(cat <<EOF
          {
            "ecs_running":     ${{ steps.ecs-check.outputs.ecs_running || 0 }},
            "ecs_desired":     ${{ steps.ecs-check.outputs.ecs_desired || 0 }},
            "alb_state":       "${{ steps.alb-check.outputs.alb_state || 'unknown' }}",
            "startup_log_ok":  ${{ steps.log-check.outputs.startup_log_ok || 'false' }},
            "error_log_ok":    ${{ steps.log-check.outputs.error_log_ok || 'false' }},
            "task_arn":        "${{ steps.log-check.outputs.task_arn || '' }}",
            "image":           "${{ steps.build.outputs.image || '' }}",
            "image_tag":       "${{ steps.build.outputs.image_tag || '' }}",
            "source_branch":   "${{ steps.artifact-evidence.outputs.source_branch || '' }}",
            "source_commit":   "${{ steps.artifact-evidence.outputs.source_commit || '' }}",
            "source_commit_short": "${{ steps.artifact-evidence.outputs.source_commit_short || '' }}",
            "ecr_image_digest": "${{ steps.artifact-evidence.outputs.ecr_image_digest || '' }}",
            "ecs_image_digest": "${{ steps.log-check.outputs.running_image_digest || '' }}",
            "digest_match":    ${{ steps.health.outputs.digest_match || 'false' }},
            "patch_verify_ok": ${{ steps.artifact-evidence.outputs.patch_verify_ok || 'false' }},
            "patch_verify_b64":"${{ steps.artifact-evidence.outputs.patch_verify_b64 || '' }}",
            "runtime_verify_ok": ${{ steps.log-check.outputs.runtime_verify_ok || 'false' }},
            "runtime_verify_b64":"${{ steps.log-check.outputs.runtime_verify_b64 || '' }}",
            "validation_results_b64":"${{ steps.validation-checks.outputs.validation_results_b64 || '' }}",
            "validation_overall":"${{ steps.validation-checks.outputs.validation_overall || 'PASS_WITH_WARNINGS' }}",
            "verified_at":     "$VERIFIED_AT",
            "workflow_run":    "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )

          printf '{"action":"patch_status","status":"%s","service":"%s","branch":"%s","scan_id":"%s","record_ids":%s,"evidence":%s}' \
            "$STATUS" \
            "${{ inputs.service }}" \
            "${{ inputs.branch }}" \
            "${{ inputs.scan_id }}" \
            '${{ inputs.record_ids }}' \
            "$EVIDENCE" > /tmp/callback.json

          echo "Sending callback to Lambda: $STATUS"
          cat /tmp/callback.json | python3 -m json.tool

          aws lambda invoke \
            --function-name "${{ env.LAMBDA_NAME }}" \
            --payload        file:///tmp/callback.json \
            --cli-binary-format raw-in-base64-out \
            --region         ${{ env.AWS_REGION }} \
            /tmp/lambda-response.json

          echo "Lambda callback response:"
          cat /tmp/lambda-response.json | python3 -m json.tool 2>/dev/null || cat /tmp/lambda-response.json
