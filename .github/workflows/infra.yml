name: Infrastructure — Terraform

on:
  # Auto-plan on every push/PR that touches infra/ — shows what will change.
  # Apply is intentionally NOT triggered automatically; run it manually below.
  #
  # The email-receipt Lambda is also covered: its source code is zipped by
  # the `archive_file` data source in infra/email.tf, so a code-only change
  # produces a Terraform plan (new source_code_hash → Lambda redeploy).
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "backend-services/email-receipt-lambda/**"
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - "backend-services/email-receipt-lambda/**"

  # Manual trigger — use this to actually apply or destroy.
  # Go to Actions → Infrastructure — Terraform → Run workflow.
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION:     us-east-1
  TF_WORKING_DIR: infra
  TF_VERSION:     1.7.5

jobs:
  # ── Plan ────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      contents:      read
      pull-requests: write
      id-token:      write   # required for OIDC — allows the job to request a token

    env:
      # Terraform reads TF_VAR_* env vars automatically as input variables.
      # DB_PASSWORD is stored as a GitHub secret — never appears in logs.
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
        # OIDC: GitHub sends a short-lived token to AWS, AWS verifies it against
        # the OIDC provider, then issues temporary credentials for this role.
        # No static keys stored anywhere.

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan-output.txt
            ${{ env.TF_WORKING_DIR }}/email-receipt-lambda.zip
          retention-days: 7
          # The Lambda zip is built by the archive_file data source during
          # `terraform plan`. We must ship it alongside the plan so the apply
          # job (running on a fresh runner) can find it via the relative
          # filename = "./email-receipt-lambda.zip" in the saved plan.
          if-no-files-found: warn

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... output truncated ...'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Apply ───────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: infra-approver-list

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'

    permissions:
      contents: read
      id-token: write   # required for OIDC

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
