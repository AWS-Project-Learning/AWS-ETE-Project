name: Infrastructure — Terraform

on:
  # Auto-plan on every push/PR that touches infra/ — shows what will change.
  # Apply is intentionally NOT triggered automatically; run it manually below.
  #
  # Lambda source changes are also covered: archive_file in email.tf zips
  # the email Lambda source at plan time, so a code-only change to
  # email-receipt-lambda/ still produces a Terraform plan.
  #
  # agents/vulnerability-agent/** is intentionally NOT here — that code is
  # deployed by vulnerability-agent.yml (lambda_deploy.py), not Terraform.
  # infra/agents.tf changes ARE covered by the infra/** path below.
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "backend-services/email-receipt-lambda/**"
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - "backend-services/email-receipt-lambda/**"

  # Manual trigger — use this to actually apply or destroy.
  # Go to Actions → Infrastructure — Terraform → Run workflow.
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: "Target environment (required for destroy — ECS cleanup)"
        required: false
        type: choice
        options:
          - dev
        default: dev
      confirm:
        description: "For destroy — type the environment name exactly (e.g. dev)"
        required: false

env:
  AWS_REGION:     us-east-1
  TF_WORKING_DIR: infra
  TF_VERSION:     1.7.5

jobs:
  # ── Plan ────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      contents:      read
      pull-requests: write
      id-token:      write   # required for OIDC — allows the job to request a token

    env:
      # Terraform reads TF_VAR_* env vars automatically as input variables.
      # DB_PASSWORD is stored as a GitHub secret — never appears in logs.
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
        # OIDC: GitHub sends a short-lived token to AWS, AWS verifies it against
        # the OIDC provider, then issues temporary credentials for this role.
        # No static keys stored anywhere.

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.action }}" = "destroy" ]; then
            echo "Generating destroy plan..."
            terraform plan -destroy -no-color -out=tfplan 2>&1 | tee plan-output.txt
          else
            terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          fi
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan-output.txt
            ${{ env.TF_WORKING_DIR }}/email-receipt-lambda.zip
            ${{ env.TF_WORKING_DIR }}/agent-placeholder.zip
          retention-days: 7
          # Both Lambda zips are built by archive_file data sources during
          # `terraform plan` and must be uploaded here so the apply job
          # (fresh runner, no local files) can execute the saved plan.
          if-no-files-found: warn

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan-output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... output truncated ...'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ── Apply ───────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    environment: infra-approver-list

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'

    permissions:
      contents: read
      id-token: write   # required for OIDC

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  # ── Destroy ─────────────────────────────────────────────────────────────────
  # 1. Safety confirmation  2. Delete ECS services (scripts/destroy-ecs.sh)
  # 3. Apply the saved destroy plan from the plan job.
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: plan
    environment: infra-approver-list

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    permissions:
      contents: read
      id-token: write   # required for OIDC

    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Validate destroy confirmation
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          CONFIRM="${{ github.event.inputs.confirm || '' }}"
          if [ "$CONFIRM" != "$ENV" ]; then
            echo "FAIL: For destroy, type the environment name in 'confirm'."
            echo "      Expected '$ENV', got '${CONFIRM:-<empty>}'."
            exit 1
          fi
          echo "PASS: Confirmation matches environment '$ENV'."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Destroy ECS services
        run: |
          chmod +x scripts/destroy-ecs.sh
          ./scripts/destroy-ecs.sh "${{ github.event.inputs.environment || 'dev' }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Regenerate the destroy plan here (not the plan-job artifact) so
      # force_delete / force_destroy and current state are always used.
      - name: Generate fresh destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -destroy -input=false -no-color -out=destroy.tfplan

      - name: Terraform Destroy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve destroy.tfplan
