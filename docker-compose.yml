services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: orderflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE:      orderflow
      MYSQL_USER:          orderflow
      MYSQL_PASSWORD:      orderflow123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orderflow-net

  redis:
    image: redis:7-alpine
    container_name: orderflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orderflow-net

  # ── Backend Services ─────────────────────────────────────────────────────────

  order-service:
    build:
      context: ./backend-services/order-service
    container_name: orderflow-order-service
    environment:
      DATABASE_URL: mysql+pymysql://orderflow:orderflow123@mysql:3306/orderdb
      REDIS_URL:    redis://redis:6379
      ENV:          docker
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - orderflow-net

  invoice-service:
    build:
      context: ./backend-services/invoice-service
    container_name: orderflow-invoice-service
    environment:
      DATABASE_URL:      mysql+pymysql://orderflow:orderflow123@mysql:3306/invoicedb
      REDIS_URL:         redis://redis:6379
      ORDER_SERVICE_URL: http://order-service:8001
      ENV:               docker
    ports:
      - "8002:8002"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - orderflow-net

  bff:
    build:
      context: ./backend-services/bff
    container_name: orderflow-bff
    environment:
      ORDER_SERVICE_URL:   http://order-service:8001
      INVOICE_SERVICE_URL: http://invoice-service:8002
      ENV:                 docker
    ports:
      - "8080:8080"
    depends_on:
      order-service:
        condition: service_healthy
      invoice-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - orderflow-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orderflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - bff
    networks:
      - orderflow-net

# ── Volumes & Networks ────────────────────────────────────────────────────────

volumes:
  mysql-data:

networks:
  orderflow-net:
    driver: bridge
