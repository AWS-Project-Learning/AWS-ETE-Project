# ── Dev Environment ───────────────────────────────────────────────────────────

global:
  environment:      dev
  cluster:          orderflow-dev
  region:           ap-south-1
  account_id:       "123456789012"        # Replace with real AWS account ID
  ecr_registry:     "109653023631.dkr.ecr.ap-south-1.amazonaws.com"
  log_group:        /ecs/orderflow/dev

# ── Backend Services ──────────────────────────────────────────────────────────

services:

  order-service:
    port:             8001
    cpu:              256
    memory:           512
    desired_count:    1
    health_check_path: /health
    env:
      ENV:            dev
      LOG_LEVEL:      debug
      REDIS_URL:      redis://redis.orderflow-dev.local:6379
    secrets:
      DATABASE_URL:   /orderflow/dev/order-service/db-url

  invoice-service:
    port:             8002
    cpu:              256
    memory:           512
    desired_count:    1
    health_check_path: /health
    env:
      ENV:                dev
      LOG_LEVEL:          debug
      REDIS_URL:          redis://redis.orderflow-dev.local:6379
      ORDER_SERVICE_URL:  http://order-service.orderflow-dev.local:8001
    secrets:
      DATABASE_URL:   /orderflow/dev/invoice-service/db-url

  bff:
    port:             8080
    cpu:              256
    memory:           512
    desired_count:    1
    health_check_path: /health
    env:
      ENV:                  dev
      LOG_LEVEL:            debug
      ORDER_SERVICE_URL:    http://order-service.orderflow-dev.local:8001
      INVOICE_SERVICE_URL:  http://invoice-service.orderflow-dev.local:8002
    secrets: {}
