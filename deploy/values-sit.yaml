# ── SIT Environment ───────────────────────────────────────────────────────────

global:
  environment:      sit
  cluster:          orderflow-sit
  region:           us-east-1
  account_id:       "123456789012"        # Replace with real AWS account ID
  ecr_registry:     "123456789012.dkr.ecr.us-east-1.amazonaws.com"
  log_group:        /ecs/orderflow/sit

# ── Backend Services ──────────────────────────────────────────────────────────

services:

  order-service:
    port:             8001
    cpu:              512
    memory:           1024
    desired_count:    1
    health_check_path: /health
    env:
      ENV:            sit
      LOG_LEVEL:      info
      REDIS_URL:      redis://redis.orderflow-sit.local:6379
    secrets:
      DATABASE_URL:   /orderflow/sit/order-service/db-url

  invoice-service:
    port:             8002
    cpu:              512
    memory:           1024
    desired_count:    1
    health_check_path: /health
    env:
      ENV:                sit
      LOG_LEVEL:          info
      REDIS_URL:          redis://redis.orderflow-sit.local:6379
      ORDER_SERVICE_URL:  http://order-service.orderflow-sit.local:8001
    secrets:
      DATABASE_URL:   /orderflow/sit/invoice-service/db-url

  bff:
    port:             8080
    cpu:              512
    memory:           1024
    desired_count:    1
    health_check_path: /health
    env:
      ENV:                  sit
      LOG_LEVEL:            info
      ORDER_SERVICE_URL:    http://order-service.orderflow-sit.local:8001
      INVOICE_SERVICE_URL:  http://invoice-service.orderflow-sit.local:8002
    secrets: {}
