{
  "family": "{{ service_name }}-{{ environment }}",
  "networkMode": "awsvpc",
  "requiresCompatibilities": ["EC2"],
  "executionRoleArn": "arn:aws:iam::{{ account_id }}:role/{{ execution_role }}",
  "taskRoleArn": "arn:aws:iam::{{ account_id }}:role/{{ task_role }}-{{ service_name }}",
  "cpu": "{{ cpu }}",
  "memory": "{{ memory }}",
  "containerDefinitions": [
    {
      "name": "{{ service_name }}",
      "image": "{{ ecr_registry }}/{{ service_name }}:{{ image_tag }}",
      "essential": true,
      "portMappings": [
        {
          "containerPort": {{ port }},
          "hostPort": {{ port }},
          "protocol": "tcp"
        }
      ],
      "environment": [
        {% for key, value in env.items() %}
        {
          "name": "{{ key }}",
          "value": "{{ value }}"
        }{% if not loop.last %},{% endif %}
        {% endfor %}
      ],
      "secrets": [
        {% for key, param in secrets.items() %}
        {
          "name": "{{ key }}",
          "valueFrom": "arn:aws:ssm:{{ region }}:{{ account_id }}:parameter{{ param }}"
        }{% if not loop.last %},{% endif %}
        {% endfor %}
      ],
      "logConfiguration": {
        "logDriver": "awslogs",
        "options": {
          "awslogs-group": "{{ log_group }}/{{ service_name }}",
          "awslogs-region": "{{ region }}",
          "awslogs-stream-prefix": "{{ environment }}"
        }
      },
      "healthCheck": {
        "command": [
          "CMD-SHELL",
          "curl -f http://localhost:{{ port }}{{ health_check_path }} || exit 1"
        ],
        "interval": 30,
        "timeout": 5,
        "retries": 3,
        "startPeriod": 60
      }
    }
  ]
}
