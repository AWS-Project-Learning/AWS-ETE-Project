# ── BFF — Dev Environment ─────────────────────────────────────────────────────

compute:
  cpu:           256
  memory:        256
  desired_count: 1

env:
  ENV:                  dev
  LOG_LEVEL:            debug
  # Internal services are reachable via Cloud Map private DNS.
  # Format: http://{service}.{project}-{env}.local:{port}
  ORDER_SERVICE_URL:    "http://order-service.orderflow-dev.local:8001"
  INVOICE_SERVICE_URL:  "http://invoice-service.orderflow-dev.local:8002"

# No secrets for BFF — it doesn't have a database.
env_secrets: {}
