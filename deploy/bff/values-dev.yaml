# ── BFF — Dev Environment ─────────────────────────────────────────────────────

compute:
  cpu:           256
  memory:        256
  desired_count: 1

env:
  ENV:                  dev
  LOG_LEVEL:            debug
  # All three containers run on the same EC2 instance with fixed host ports.
  # Bridge mode + SRV records are not resolvable by standard HTTP clients (httpx).
  # localhost works reliably since all services share the same EC2 host.
  ORDER_SERVICE_URL:    "http://localhost:8001"
  INVOICE_SERVICE_URL:  "http://localhost:8002"
  # CORS — allow CloudFront origin + local dev server
  CORS_ORIGINS:         "https://d7v98dznpwca9.cloudfront.net,http://localhost:5173"

# No secrets for BFF — it doesn't have a database.
env_secrets: {}
