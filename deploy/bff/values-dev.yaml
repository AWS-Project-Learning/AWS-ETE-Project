# ── BFF — Dev Environment ─────────────────────────────────────────────────────

compute:
  cpu:           256
  memory:        256
  desired_count: 1

env:
  ENV:                  dev
  LOG_LEVEL:            debug
  # awsvpc mode: each task gets its own private IP registered in Cloud Map (Type A).
  # Standard DNS resolution works — httpx resolves the hostname to the task IP.
  ORDER_SERVICE_URL:    "http://order-service.orderflow-dev.local:8001"
  INVOICE_SERVICE_URL:  "http://invoice-service.orderflow-dev.local:8002"
  # CORS — allow CloudFront origin + local dev server
  CORS_ORIGINS:         "https://d7v98dznpwca9.cloudfront.net,http://localhost:5173"

# No secrets for BFF — it doesn't have a database.
env_secrets: {}
