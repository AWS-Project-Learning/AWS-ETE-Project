# ── Order Service — Dev Environment ───────────────────────────────────────────

compute:
  cpu:           256
  memory:        512
  desired_count: 1

env:
  ENV:       dev
  LOG_LEVEL: debug

# SSM paths created by Terraform — deploy.py wires them as ECS "secrets",
# i.e. valueFrom references that ECS resolves at task start.
# Both DATABASE_URL (a SecureString secret) and ORDER_CREATED_TOPIC_ARN
# (a plain String) are injected the same way; ECS treats them identically.
env_secrets:
  DATABASE_URL:
    ssm_path: /orderflow/dev/order-service/db-url

  # Published to after every successful order commit. Read by events.py.
  ORDER_CREATED_TOPIC_ARN:
    ssm_path: /orderflow/dev/infra/order-created-topic-arn

  # Published to whenever the order status changes (Pending → Shipped, etc.).
  # The Lambda subscribed to it filters out noisy intermediate statuses.
  ORDER_STATUS_UPDATED_TOPIC_ARN:
    ssm_path: /orderflow/dev/infra/order-status-updated-topic-arn
