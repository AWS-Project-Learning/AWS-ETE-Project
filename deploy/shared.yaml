# ── Shared Infrastructure References ─────────────────────────────────────────
# Values here are account/region-level constants read by deploy.py.
# Environment-specific infra references (cluster name, TG ARNs) are read
# from SSM at deploy time — not hardcoded here.
#
# This file is maintained by the platform team.
# Service teams should not need to touch this.

account_id:     "109653023631"
region:         us-east-1
project:        orderflow
ecr_registry:   "109653023631.dkr.ecr.us-east-1.amazonaws.com"

# ECS task execution role — shared by all services.
# deploy.py reads the ARN from SSM: /orderflow/{env}/infra/execution-role-arn
execution_role: ecs-task-execution-role

# Network mode for all Fargate services.
# awsvpc is the only mode Fargate supports — each task gets its own ENI and
# private IP, which Cloud Map registers as an A record. Standard DNS resolution
# works (http://order-service.orderflow-dev.local:8001).
network_mode: awsvpc

# Default compute — services can override in their values-{env}.yaml
# Fargate has FIXED valid CPU/memory combinations (not arbitrary):
#   cpu=256  → memory must be 512, 1024, or 2048
#   cpu=512  → memory must be 1024, 2048, 3072, or 4096
#   cpu=1024 → memory must be 2048 .. 8192 (in 1024 steps)
#   ... see render.py comment for the link to the full table.
# 256 + 512 is the smallest valid combo and the cheapest option (~$0.012/hr per task).
defaults:
  cpu:                    256
  memory:                 512
  desired_count:          1
  health_check_interval:  30
  health_check_timeout:   5
  health_check_retries:   3
  health_check_start_period: 60
