# ── Global Defaults ───────────────────────────────────────────────────────────
# These values apply to all services across all environments.
# Override them in values-{env}.yaml as needed.

global:
  region:           us-east-1
  account_id:       "109653023631"
  ecr_registry:     "109653023631.dkr.ecr.us-east-1.amazonaws.com"
  execution_role:   ecs-task-execution-role
  task_role:        ecs-task-role         # Final role: ecs-task-role-{service_name}
  log_group:        /ecs/orderflow

# ── Service Defaults ──────────────────────────────────────────────────────────
# Sensible defaults for all backend services.
# Override per service inside the env values files.

service_defaults:
  cpu:              256
  memory:           512
  desired_count:    1
  health_check_path: /health
  env:
    ENV: production
  secrets: {}
